name: Publish Release and Snapshot JARs

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      # On a version tag (v1.2.3), set the release version across all modules
      - name: Set release version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          echo "Setting version to $TAG_VERSION"
          mvn versions:set -DnewVersion=$TAG_VERSION -DgenerateBackupPoms=false
          mvn versions:set -DnewVersion=$TAG_VERSION -DgenerateBackupPoms=false -f framework-bom/pom.xml
          mvn versions:set-property -Dproperty=framework.core.version -DnewVersion=$TAG_VERSION -DgenerateBackupPoms=false -f framework-bom/pom.xml

      # Step 1: Build
      - name: Build and install all modules
        run: mvn clean install -DskipTests -B

      # Step 2: Deploy everything to GitHub Packages
      - name: Deploy to GitHub Packages
        run: mvn deploy -DskipTests -B
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # On a version tag — attach the JAR to the GitHub Release
      - name: Upload JAR to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            framework-core/target/framework-core-*.jar
            framework-bom/pom.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # On push to main — update the rolling snapshot pre-release
      - name: Upload snapshot JAR to pre-release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-snapshot
          name: Latest development snapshot
          prerelease: true
          files: framework-core/target/framework-core-*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}